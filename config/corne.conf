# Corne / Chocofi ZMK config

# nice!view display. The nice_view shield provides its own combined
# status widget (layer, battery, output, WPM). Do NOT also enable
# CONFIG_ZMK_WIDGET_* — the symbols collide at link time.
CONFIG_ZMK_DISPLAY=y

# RGB underglow is not installed on this board.
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
