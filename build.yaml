# Build matrix for Chocofi Wireless (Corne shield on nice!nano v2).
# Three targets: left half, right half, and a settings-reset UF2 used to
# wipe BLE bonds and clear the settings partition before reflashing.
---
include:
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: corne_right nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: settings_reset
